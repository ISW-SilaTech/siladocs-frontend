version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# SilaDocs · Hyperledger Fabric Minimal Network (1 Org · 1 Peer · RAFT Orderer)
#
# Run:  ./start.sh
# Stop: docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

networks:
  fabric-net:
    name: siladocs-fabric

volumes:
  orderer-data:
  peer0-data:
  peer0-couchdb-data:

services:

  # ── Certificate Authority ────────────────────────────────────────────────
  ca.siladocs.com:
    image: hyperledger/fabric-ca:1.5.7
    container_name: ca.siladocs.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-siladocs
      - FABRIC_CA_SERVER_TLS_ENABLED=false
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./crypto-config/ca:/etc/hyperledger/fabric-ca-server
    networks:
      - fabric-net

  # ── Orderer (RAFT single node) ───────────────────────────────────────────
  orderer.siladocs.com:
    image: hyperledger/fabric-orderer:2.5.4
    container_name: orderer.siladocs.com
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=false
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=false
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_OPERATIONS_LISTENADDRESS=orderer.siladocs.com:9443
    ports:
      - "7050:7050"
      - "7053:7053"
      - "9443:9443"
    volumes:
      - orderer-data:/var/hyperledger/production/orderer
      - ./crypto-config/ordererOrganizations/siladocs.com/orderers/orderer.siladocs.com/msp:/var/hyperledger/orderer/msp
    networks:
      - fabric-net

  # ── CouchDB (peer state database) ───────────────────────────────────────
  couchdb0:
    image: couchdb:3.3.3
    container_name: couchdb0
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    volumes:
      - peer0-couchdb-data:/opt/couchdb/data
    networks:
      - fabric-net

  # ── Peer 0 ──────────────────────────────────────────────────────────────
  peer0.org1.siladocs.com:
    image: hyperledger/fabric-peer:2.5.4
    container_name: peer0.org1.siladocs.com
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=siladocs-fabric
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=false
      - CORE_PEER_ID=peer0.org1.siladocs.com
      - CORE_PEER_ADDRESS=peer0.org1.siladocs.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.siladocs.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.siladocs.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.siladocs.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_OPERATIONS_LISTENADDRESS=peer0.org1.siladocs.com:9444
    ports:
      - "7051:7051"
      - "9444:9444"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - peer0-data:/var/hyperledger/production
      - ./crypto-config/peerOrganizations/org1.siladocs.com/peers/peer0.org1.siladocs.com/msp:/etc/hyperledger/fabric/msp
    depends_on:
      - couchdb0
      - orderer.siladocs.com
    networks:
      - fabric-net

  # ── Fabric REST API (Node.js middleware - tu backend Spring lo consume) ──
  fabric-api:
    build:
      context: ./fabric-api
      dockerfile: Dockerfile
    container_name: fabric-api
    environment:
      - PORT=8000
      - PEER_ENDPOINT=peer0.org1.siladocs.com:7051
      - ORDERER_ENDPOINT=orderer.siladocs.com:7050
      - CHANNEL_NAME=silabos-channel
      - CHAINCODE_NAME=silabos-cc
      - MSP_ID=Org1MSP
      - CRYPTO_PATH=/crypto
    ports:
      - "8000:8000"
    volumes:
      - ./crypto-config/peerOrganizations/org1.siladocs.com/users/Admin@org1.siladocs.com:/crypto/admin
    depends_on:
      - peer0.org1.siladocs.com
    networks:
      - fabric-net
