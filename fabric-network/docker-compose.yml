# ─────────────────────────────────────────────────────────────────────────────
# SilaDocs · Hyperledger Fabric Minimal Network (1 Org · 1 Peer · RAFT Orderer)
# TLS enabled (required for Fabric 2.5.4 etcdraft)
#
# Run:  ./start.sh
# Stop: docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

networks:
  fabric-net:
    name: siladocs-fabric

volumes:
  orderer-data:
  peer0-data:
  peer0-couchdb-data:

services:

  ca.siladocs.com:
    image: hyperledger/fabric-ca:1.5.7
    container_name: ca.siladocs.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-siladocs
      - FABRIC_CA_SERVER_TLS_ENABLED=false
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./crypto-config/ca:/etc/hyperledger/fabric-ca-server
    networks:
      - fabric-net

  orderer.siladocs.com:
    image: hyperledger/fabric-orderer:2.5.4
    container_name: orderer.siladocs.com
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_OPERATIONS_LISTENADDRESS=orderer.siladocs.com:9443
    ports:
      - "7050:7050"
      - "7053:7053"
      - "9443:9443"
    volumes:
      - orderer-data:/var/hyperledger/production/orderer
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/siladocs.com/orderers/orderer.siladocs.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/siladocs.com/orderers/orderer.siladocs.com/tls:/var/hyperledger/orderer/tls
    networks:
      - fabric-net

  couchdb0:
    image: couchdb:3.3.3
    container_name: couchdb0
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    volumes:
      - peer0-couchdb-data:/opt/couchdb/data
    networks:
      - fabric-net

  peer0.siladocs.com:
    image: hyperledger/fabric-peer:2.5.4
    container_name: peer0.siladocs.com
    environment:
      - CORE_VM_ENDPOINT=unix:///var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=siladocs-fabric
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.siladocs.com
      - CORE_PEER_ADDRESS=peer0.siladocs.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.siladocs.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.siladocs.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.siladocs.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_OPERATIONS_LISTENADDRESS=peer0.siladocs.com:9444
      - CORE_CHAINCODE_EXTERNALBUILDERS=[{"name":"ccaas_builder","path":"/opt/hyperledger/ccaas_builder","propagateEnvironment":["CHAINCODE_SERVER_ADDRESS","CHAINCODE_ID"]}]
    ports:
      - "7051:7051"
      - "9444:9444"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - peer0-data:/var/hyperledger/production
      - ./crypto-config/peerOrganizations/siladocs.com/peers/peer0.siladocs.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/siladocs.com/peers/peer0.siladocs.com/tls:/etc/hyperledger/fabric/tls
      - ./crypto-config/peerOrganizations/siladocs.com/users/Admin@siladocs.com/msp:/etc/hyperledger/fabric/admin-msp
      - ./crypto-config/ordererOrganizations/siladocs.com/orderers/orderer.siladocs.com/tls/ca.crt:/etc/hyperledger/fabric/orderer-tls/ca.crt
      - ./channel-artifacts:/etc/hyperledger/fabric/channel-artifacts
      - ./chaincode:/etc/hyperledger/fabric/chaincode
    depends_on:
      - couchdb0
      - orderer.siladocs.com
    networks:
      - fabric-net

  silabos-cc:
    build:
      context: ./chaincode
      dockerfile: Dockerfile
    container_name: silabos-cc
    environment:
      - CHAINCODE_SERVER_ADDRESS=0.0.0.0:7052
      - CHAINCODE_ID=${CHAINCODE_ID:-silabos-cc_1.0:placeholder}
    ports:
      - "7060:7052"
    networks:
      - fabric-net

  fabric-api:
    build:
      context: ./fabric-api
      dockerfile: Dockerfile
    container_name: fabric-api
    environment:
      - PORT=8000
      - PEER_ENDPOINT=peer0.siladocs.com:7051
      - ORDERER_ENDPOINT=orderer.siladocs.com:7050
      - CHANNEL_NAME=silabos-channel
      - CHAINCODE_NAME=silabos-cc
      - MSP_ID=Org1MSP
      - CRYPTO_PATH=/crypto
    ports:
      - "8000:8000"
    volumes:
      - ./crypto-config/peerOrganizations/siladocs.com/users/Admin@siladocs.com:/crypto/admin
      - ./crypto-config/peerOrganizations/siladocs.com/peers/peer0.siladocs.com/tls:/crypto/peer-tls
      - ./crypto-config/ordererOrganizations/siladocs.com/orderers/orderer.siladocs.com/tls:/crypto/orderer-tls
    depends_on:
      - peer0.siladocs.com
    networks:
      - fabric-net
